<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEBSITE BÁN CLONE FACEBOOK TỰ ĐỘNG</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f5f5f5;
}

/* ===== HEADER ===== */
header{
height:55px;
background:#ffffff;
display:flex;
align-items:center;
padding:0 15px;
box-shadow:0 2px 5px rgba(0,0,0,0.08);
position:sticky;
top:0;
z-index:1000;
}

.menu-btn{
font-size:22px;
cursor:pointer;
}

/* ===== SIDEBAR ===== */
.sidebar{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:#ffffff;
box-shadow:2px 0 10px rgba(0,0,0,0.1);
transition:0.3s;
z-index:2000;
}

.sidebar.active{
left:0;
}

.sidebar-header{
display:flex;
align-items:center;
padding:15px;
border-bottom:1px solid #eee;
}

.close-btn{
font-size:20px;
cursor:pointer;
margin-right:10px;
}

.sidebar a{
display:block;
padding:15px;
text-decoration:none;
color:#333;
border-bottom:1px solid #f1f1f1;
transition:0.2s;
}

.sidebar a:hover{
background:#f5f5f5;
}

/* ===== CONTAINER ===== */
.container{
padding:15px;
max-width:900px;
margin:auto;
}

/* ===== POST ===== */
.post{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
transition:0.25s;
position:relative;
}

.post:hover{
transform:translateY(-5px);
box-shadow:0 15px 30px rgba(0,0,0,0.12);
}

.post-top{
display:flex;
justify-content:space-between;
align-items:flex-start;
gap:10px;
}

.post-title{
font-weight:bold;
font-size:15px;
line-height:1.4;
}

.buy-btn{
background:red;
color:white;
border:none;
padding:10px 16px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
font-size:14px;
}

.buy-btn:hover{
background:#cc0000;
}

/* ===== BADGES ===== */
.badges{
margin-top:10px;
display:flex;
flex-direction:column;
align-items:flex-start;
gap:6px;
}

.badge{
border:1px solid #ccc;
padding:4px 8px;
border-radius:5px;
font-size:13px;
background:#fff;
}

.price{
border:1px solid #ff0000;
color:#ff0000;
padding:4px 8px;
border-radius:5px;
font-size:13px;
}

/* MOBILE */
@media(max-width:600px){

.post-top{
flex-direction:column;
}

.buy-btn{
width:100%;
}

}

</style>
</head>

<body>

<header>
<div class="menu-btn" onclick="openMenu()">☰</div>
</header>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

<div class="sidebar-header">
<div class="close-btn" onclick="closeMenu()">←</div>
<b>MENU</b>
</div>

<a href="#">Trang chủ</a>
<a href="#">Nạp tiền</a>
<a href="#">Hỗ trợ</a>

</div>

<div class="container">

<div class="post">

<div class="post-top">
<div class="post-title">
TÀI KHOẢN TẠO 2 THÁNG, 1K-2KFR, 2FA, MAIL NHẬN ĐƯỢC CODE
</div>

<button class="buy-btn">MUA NGAY</button>
</div>

<div class="badges">
<div class="badge">SL: 10</div>
<div class="price">Giá 10000đ</div>
</div>

</div>

</div>

<script>
function openMenu(){
document.getElementById("sidebar").classList.add("active");
}

function closeMenu(){
document.getElementById("sidebar").classList.remove("active");
}
</script>

</body>
</html>
