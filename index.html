<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEBSITE BÁN CLONE FACEBOOK TỰ ĐỘNG</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f5f6fa;
padding:40px;
}

.header{
font-size:28px;
font-weight:bold;
margin-bottom:30px;
}

.post{
width:420px;
background:#f0f0f0;
padding:20px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
transition:0.25s;
cursor:pointer;
}

.post:hover{
background:#ffffff;
transform:translateY(-5px);
box-shadow:0 15px 35px rgba(0,0,0,0.15);
}

.post-title{
font-size:18px;
font-weight:bold;
position:relative;
padding-bottom:22px;
}

.quantity{
position:absolute;
right:0;
bottom:0;
font-size:12px;
padding:3px 8px;
border:1.5px solid #a855f7;
color:#a855f7;
border-radius:6px;
background:transparent;
}

.post-desc{
margin-top:10px;
color:#333;
font-size:14px;
}
</style>
</head>

<body>

<div class="header">
WEBSITE BÁN CLONE FACEBOOK TỰ ĐỘNG
</div>

<div class="post">
<div class="post-title">
tài khoản tạo 2-6 tháng, mail lấy được code, 1000-2000bb.
<span class="quantity">số lượng:10</span>
</div>

<div class="post-desc">
Clone Facebook chất lượng, login ổn định.
</div>
</div>

</body>
</html>
