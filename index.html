<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEBSITE BÁN CLONE FACEBOOK TỰ ĐỘNG</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f5f5f7;
}

/* HEADER */
.header{
position:fixed;
top:0;
left:0;
width:100%;
height:60px;
background:#111;
color:white;
display:flex;
align-items:center;
padding:0 15px;
z-index:1000;
}

.title{
margin-left:15px;
font-weight:bold;
font-size:14px;
letter-spacing:.5px;
}

/* MENU BUTTON */
.menu-btn{
width:30px;
cursor:pointer;
}

.menu-btn div{
height:3px;
background:white;
margin:5px 0;
border-radius:2px;
}

/* SIDEBAR */
.sidebar{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:#111;
padding-top:70px;
transition:.3s;
z-index:999;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:15px 20px;
border-bottom:1px solid rgba(255,255,255,.08);
}

.sidebar a:hover{
background:#1a1a1a;
}

.sidebar.active{
left:0;
}

/* CONTENT */
.container{
padding:90px 15px;
max-width:900px;
margin:auto;
}

/* POST */
.post{
background:#f0f0f0;
border-radius:12px;
padding:18px;
transition:.25s;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.post:hover{
background:white;
transform:translateY(-4px);
box-shadow:0 15px 30px rgba(0,0,0,.15);
}

.post-title{
font-weight:bold;
font-size:15px;
position:relative;
padding-bottom:18px;
}

/* QUANTITY */
.quantity{
position:absolute;
right:0;
bottom:-2px;
font-size:11px;
padding:2px 6px;
border:1px solid #8a2be2;
color:#8a2be2;
border-radius:6px;
}

/* RESPONSIVE */
@media(max-width:600px){
.title{
font-size:12px;
}
.post-title{
font-size:14px;
}
}

</style>
</head>

<body>

<div class="header">
<div class="menu-btn" onclick="toggleMenu()">
<div></div>
<div></div>
<div></div>
</div>
<div class="title">WEBSITE BÁN CLONE FACEBOOK TỰ ĐỘNG</div>
</div>

<div class="sidebar" id="sidebar">
<a href="#">Trang chủ</a>
<a href="#">Nạp tiền</a>
<a href="#">Hỗ trợ</a>
</div>

<div class="container">

<div class="post">
<div class="post-title">
tài khoản tạo 2-6 tháng, mail lấy được code, 1000-2000bb.
<span class="quantity">số lượng:10</span>
</div>
</div>

</div>

<script>
function toggleMenu(){
document.getElementById("sidebar").classList.toggle("active");
}
</script>

</body>
</html>
