<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEBSITE BÁN CLONE FACEBOOK TỰ ĐỘNG</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f5f5f5;
}

/* HEADER */
.header{
background:#eee;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
position:relative;
}

/* MENU BUTTON */
.menu-btn{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
font-size:26px;
cursor:pointer;
}

/* SIDEBAR */
.sidebar{
position:fixed;
left:-250px;
top:0;
width:250px;
height:100%;
background:white;
box-shadow:0 0 10px rgba(0,0,0,0.2);
transition:0.3s;
padding-top:60px;
z-index:1000;
}

.sidebar a{
display:block;
padding:15px;
border-bottom:1px solid #eee;
cursor:pointer;
}

.sidebar a:hover{
background:#f3f3f3;
}

.close-menu{
position:absolute;
right:10px;
top:10px;
cursor:pointer;
font-size:20px;
}

/* CONTAINER */
.container{
max-width:900px;
margin:30px auto;
padding:10px;
}

/* POST */
.post{
background:white;
padding:20px;
border-radius:10px;
transition:0.2s;
box-shadow:0 0 0 rgba(0,0,0,0);
}

.post:hover{
transform:translateY(-5px);
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.post-header{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
flex-wrap:wrap;
}

.post-title{
font-weight:bold;
font-size:16px;
flex:1;
}

/* BUY BUTTON */
.buy-btn{
background:red;
color:white;
padding:10px 18px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.buy-btn:hover{
background:#cc0000;
}

/* INFO BOX */
.info-row{
margin-top:10px;
}

.sl-box{
display:inline-block;
border:1px solid black;
padding:3px 8px;
font-size:13px;
}

.price-box{
display:inline-block;
border:1px solid black;
padding:3px 8px;
font-size:13px;
margin-top:5px;
}

/* POPUP */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
z-index:2000;
}

.popup-box{
background:white;
padding:20px;
border-radius:10px;
width:95%;
max-width:400px;
position:relative;
}

.close-popup{
position:absolute;
right:10px;
top:10px;
cursor:pointer;
font-weight:bold;
}

/* SUPPORT BOX */
.support-item{
border:1px solid #ccc;
padding:15px;
margin-top:10px;
cursor:pointer;
text-align:center;
}

.support-item:hover{
background:#f5f5f5;
}

/* BUY POPUP */
.buy-row{
border:1px solid #ccc;
padding:10px;
margin-top:10px;
}

.buy-flex{
display:flex;
gap:5px;
}

.buy-flex div:first-child{
flex:2;
}

.buy-flex div:last-child{
flex:1;
}

.buy-input{
width:100%;
padding:5px;
}

.pay-btn{
width:100%;
background:green;
color:white;
padding:10px;
margin-top:10px;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="sidebar" id="sidebar">
<div class="close-menu" onclick="closeMenu()">←</div>

<a onclick="reloadPage()">Trang chủ</a>
<a>Nạp tiền</a>
<a onclick="openSupport()">Hỗ trợ</a>

</div>

<div class="header">
<div class="menu-btn" onclick="openMenu()">☰</div>
WEBSITE BÁN CLONE FACEBOOK TỰ ĐỘNG
</div>

<div class="container">

<div class="post">

<div class="post-header">
<div class="post-title">
TÀI KHOẢN TẠO 2 THÁNG, 1K-2KFR, 2FA, MAIL NHẬN ĐƯỢC CODE
</div>

<button class="buy-btn" onclick="openBuy()">Mua ngay</button>
</div>

<div class="info-row">
<div class="sl-box">SL: 10</div>
</div>

<div class="info-row">
<div class="price-box">Giá 10000đ</div>
</div>

</div>

</div>


<!-- SUPPORT POPUP -->
<div class="popup" id="supportPopup">
<div class="popup-box">

<div class="close-popup" onclick="closeSupport()">X</div>

<div class="support-item" onclick="window.open('https://zalo.me/0347241585')">
Zalo
</div>

<div class="support-item" onclick="window.open('https://www.facebook.com/profile.php?id=1815703088')">
Facebook
</div>

</div>
</div>


<!-- BUY POPUP -->
<div class="popup" id="buyPopup">
<div class="popup-box">

<div class="close-popup" onclick="closeBuy()">X</div>

<div style="font-weight:bold;margin-bottom:10px;">
TÀI KHOẢN TẠO 2 THÁNG, 1K-2KFR, 2FA, MAIL NHẬN ĐƯỢC CODE
</div>

<div class="buy-row">
<div class="buy-flex">
<div>SỐ LƯỢNG CẦN MUA</div>
<div>
<input class="buy-input" id="qty" type="number" value="1" oninput="calc()">
</div>
</div>
</div>

<div class="buy-row">
THÀNH TIỀN: <span id="total">10000</span>đ
</div>

<button class="pay-btn">
THANH TOÁN
</button>

</div>
</div>


<script>

let price = 10000;

function calc(){
let qty = document.getElementById("qty").value || 0;
document.getElementById("total").innerText = qty * price;
}

/* MENU */
function openMenu(){
document.getElementById("sidebar").style.left="0";
}

function closeMenu(){
document.getElementById("sidebar").style.left="-250px";
}

/* SUPPORT */
function openSupport(){
document.getElementById("supportPopup").style.display="flex";
}

function closeSupport(){
document.getElementById("supportPopup").style.display="none";
}

/* BUY */
function openBuy(){
document.getElementById("buyPopup").style.display="flex";
calc();
}

function closeBuy(){
document.getElementById("buyPopup").style.display="none";
}

/* reload */
function reloadPage(){
location.reload();
}

</script>

</body>
</html>
