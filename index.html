<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEBSITE BÁN CLONE FACEBOOK TỰ ĐỘNG</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f5f5f5;
}

/* HEADER */
.header{
background:#eee;
padding:14px 50px;
text-align:center;
font-weight:bold;
font-size:clamp(16px,2vw,22px);
position:relative;
}

.menu-btn{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
font-size:22px;
cursor:pointer;
}

.user-box{
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
display:flex;
align-items:center;
gap:8px;
cursor:pointer;
font-size:14px;
}

.avatar{
width:32px;
height:32px;
border-radius:50%;
background:#ccc;
}

/* SIDEBAR */
.sidebar{
position:fixed;
left:-260px;
top:0;
width:260px;
height:100%;
background:white;
box-shadow:0 0 10px rgba(0,0,0,0.2);
transition:.3s;
z-index:1000;
padding:15px;
}

.sidebar.active{
left:0;
}

.close-sidebar{
border:1px solid #000;
padding:5px;
cursor:pointer;
display:inline-block;
margin-bottom:15px;
}

.menu-item{
padding:12px;
border:1px solid #ddd;
margin-bottom:10px;
cursor:pointer;
}

.container{
max-width:900px;
margin:25px auto;
padding:12px;
}

/* POST */
.post{
background:white;
padding:20px;
border-radius:8px;
transition:.2s;
box-shadow:0 0 0 rgba(0,0,0,0);
}

.post:hover{
transform:translateY(-5px);
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.post-header{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}

.post-title{
flex:1;
font-size:clamp(14px,2vw,18px);
}

.buy-btn{
background:red;
color:white;
border:none;
padding:10px 18px;
cursor:pointer;
font-weight:bold;
font-size:clamp(13px,2vw,16px);
white-space:nowrap;
}

.tag{
border:1px solid #000;
padding:3px 8px;
display:inline-block;
margin-top:8px;
font-size:14px;
}

.price{
border:1px solid #000;
padding:3px 8px;
display:inline-block;
margin-top:5px;
font-size:14px;
}

/* POPUP */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
padding:10px;
z-index:2000;
}

.popup-box{
background:white;
padding:20px;
width:100%;
max-width:420px;
border-radius:8px;
position:relative;
}

.close{
position:absolute;
right:10px;
top:10px;
cursor:pointer;
font-weight:bold;
}

.input-row{
display:flex;
gap:10px;
margin:10px 0;
align-items:center;
}

.input-row input{
flex:1;
padding:8px;
width:100%;
}

.pay-btn{
width:100%;
background:red;
color:white;
padding:12px;
border:none;
cursor:pointer;
margin-top:10px;
}

/* USER MENU */
.user-menu{
position:absolute;
right:0;
top:45px;
background:white;
border:1px solid #ddd;
display:none;
min-width:160px;
}

.user-menu div{
padding:10px;
cursor:pointer;
border-bottom:1px solid #eee;
}

.user-menu div:hover{
background:#f2f2f2;
}

.support-box{
border:1px solid #000;
padding:15px;
margin-top:10px;
cursor:pointer;
text-align:center;
}

/* MOBILE */
@media(max-width:600px){

.post-header{
flex-direction:column;
align-items:flex-start;
}

.buy-btn{
width:100%;
text-align:center;
}

.header{
padding:14px 40px;
}

.user-box span{
display:none;
}

}

</style>
</head>

<body>

<div class="sidebar" id="sidebar">
<div class="close-sidebar" onclick="toggleMenu()">←</div>

<div class="menu-item" onclick="location.reload()">Trang Chủ</div>
<div class="menu-item">Nạp Tiền</div>
<div class="menu-item" onclick="openSupport()">Hỗ Trợ</div>

</div>

<div class="header">

<div class="menu-btn" onclick="toggleMenu()">☰</div>

WEBSITE BÁN CLONE FACEBOOK TỰ ĐỘNG

<div class="user-box" onclick="toggleUser()">
<span>Xin chào, vangng</span>
<div class="avatar"></div>

<div class="user-menu" id="userMenu">
<div>Thông Tin Tài Khoản</div>
<div>Đăng Xuất</div>
</div>

</div>

</div>

<div class="container">

<div class="post">

<div class="post-header">

<div class="post-title">
TÀI KHOẢN TẠO 2 THÁNG, 1K-2KFR, 2FA, MAIL NHẬN ĐƯỢC CODE
</div>

<button class="buy-btn" onclick="openBuy()">Mua Ngay</button>

</div>

<div class="tag">SL: 10</div>
<div class="price">Giá 10000đ</div>

</div>

</div>

<div class="popup" id="supportPopup">
<div class="popup-box">
<div class="close" onclick="closeSupport()">X</div>

<div class="support-box"
onclick="window.open('https://zalo.me/0347241585')">
Zalo
</div>

<div class="support-box"
onclick="window.open('https://www.facebook.com/profile.php?id=1815703088')">
Facebook
</div>

</div>
</div>

<div class="popup" id="buyPopup">
<div class="popup-box">

<div class="close" onclick="closeBuy()">X</div>

<b>
TÀI KHOẢN TẠO 2 THÁNG, 1K-2KFR, 2FA, MAIL NHẬN ĐƯỢC CODE
</b>

<div class="input-row">
<div style="flex:2">SỐ LƯỢNG CẦN MUA</div>
<input type="number" id="qty" value="1" oninput="calc()">
</div>

<div class="input-row">
<div style="flex:2">THÀNH TIỀN</div>
<input type="text" id="total" readonly>
</div>

<button class="pay-btn">THANH TOÁN</button>

</div>
</div>

<script>

let price = 10000;

function toggleMenu(){
sidebar.classList.toggle("active");
}

function openSupport(){
supportPopup.style.display="flex";
}

function closeSupport(){
supportPopup.style.display="none";
}

function openBuy(){
buyPopup.style.display="flex";
calc();
}

function closeBuy(){
buyPopup.style.display="none";
}

function calc(){
let qty = document.getElementById("qty").value || 0;
document.getElementById("total").value =
(qty * price).toLocaleString()+"đ";
}

function toggleUser(){
let menu = document.getElementById("userMenu");
menu.style.display =
menu.style.display=="block" ? "none" : "block";
}

</script>

</body>
</html>
