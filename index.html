<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEBSITE BÁN CLONE FACEBOOK TỰ ĐỘNG</title>

<style>
*{box-sizing:border-box;font-family:Arial}
body{margin:0;background:#f5f5f5}

/* header */
.header{
background:#111;
color:white;
padding:14px 16px;
position:sticky;
top:0;
z-index:1000;
}

.title{
font-size:18px;
font-weight:bold;
}

.menu-btn{
margin-top:8px;
cursor:pointer;
width:35px;
}

.menu-btn div{
height:4px;
background:white;
margin:6px 0;
border-radius:3px;
}

/* sidebar */
.sidebar{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:white;
box-shadow:2px 0 10px rgba(0,0,0,0.2);
padding:20px;
transition:0.3s;
z-index:2000;
}

.sidebar.active{left:0}

.close-menu{
position:absolute;
right:10px;
top:10px;
font-size:20px;
cursor:pointer;
}

.menu-item{
padding:12px;
border-radius:8px;
margin-top:10px;
background:#f2f2f2;
cursor:pointer;
}

.menu-item:hover{background:#e6e6e6}

/* post */
.container{padding:15px}

.post{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
transition:0.2s;
position:relative;
}

.post:hover{
transform:translateY(-3px);
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

.post-header{
display:flex;
justify-content:space-between;
align-items:flex-start;
gap:10px;
}

.post-title{
font-weight:bold;
font-size:15px;
flex:1;
}

.buy-btn{
background:red;
color:white;
border:none;
padding:10px 16px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
font-size:14px;
}

.buy-btn:hover{opacity:.9}

.meta{
margin-top:8px;
display:flex;
flex-direction:column;
gap:6px;
align-items:flex-start;
}

.box{
border:1px solid #333;
padding:4px 8px;
border-radius:5px;
font-size:13px;
}

/* popup */
.popup{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
z-index:5000;
}

.popup.show{display:flex}

.popup-box{
background:white;
padding:20px;
border-radius:10px;
width:95%;
max-width:400px;
position:relative;
}

.close{
position:absolute;
right:10px;
top:10px;
cursor:pointer;
font-weight:bold;
}

/* support buttons */
.support-btn{
padding:12px;
border:1px solid #ccc;
border-radius:8px;
margin-top:10px;
cursor:pointer;
text-align:center;
}

.support-btn:hover{
background:#f2f2f2;
}

/* buy popup */
.row{
margin-top:10px;
}

.flex{
display:flex;
gap:10px;
align-items:center;
}

.big{
flex:2;
}

.small{
flex:1;
}

input{
width:100%;
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

.pay-btn{
margin-top:15px;
background:red;
color:white;
padding:12px;
border:none;
width:100%;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.total-box{
margin-top:10px;
padding:10px;
border:1px solid #333;
border-radius:8px;
text-align:center;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
<div class="title">WEBSITE BÁN CLONE FACEBOOK TỰ ĐỘNG</div>

<div class="menu-btn" onclick="openMenu()">
<div></div>
<div></div>
<div></div>
</div>
</div>

<!-- sidebar -->
<div class="sidebar" id="sidebar">
<div class="close-menu" onclick="closeMenu()">←</div>

<div class="menu-item">Trang chủ</div>
<div class="menu-item">Nạp tiền</div>
<div class="menu-item" onclick="openSupport()">Hỗ trợ</div>
</div>

<div class="container">

<div class="post">

<div class="post-header">
<div class="post-title">
TÀI KHOẢN TẠO 2 THÁNG, 1K-2KFR, 2FA, MAIL NHẬN ĐƯỢC CODE
</div>

<button class="buy-btn" onclick="openBuy()">Mua ngay</button>
</div>

<div class="meta">
<div class="box">SL: 10</div>
<div class="box">Giá 10000đ</div>
</div>

</div>

</div>

<!-- support popup -->
<div class="popup" id="supportPopup">
<div class="popup-box">
<div class="close" onclick="closeSupport()">X</div>

<h3>Hỗ trợ</h3>

<div class="support-btn" onclick="location.href='https://zalo.me/0347241585'">
Zalo
</div>

<div class="support-btn" onclick="location.href='https://www.facebook.com/profile.php?id=1815703088'">
Facebook
</div>

</div>
</div>

<!-- buy popup -->
<div class="popup" id="buyPopup">
<div class="popup-box">
<div class="close" onclick="closeBuy()">X</div>

<h3>Mua tài khoản</h3>

<div class="row">
<div class="flex">
<div class="big">SỐ LƯỢNG CẦN MUA</div>
<div class="small">
<input type="number" id="qty" value="1" oninput="calc()">
</div>
</div>
</div>

<div class="total-box">
THÀNH TIỀN: <span id="total">10000</span>đ
</div>

<button class="pay-btn">THANH TOÁN</button>

</div>
</div>

<script>
const price = 10000;

function calc(){
let qty = document.getElementById("qty").value || 0;
document.getElementById("total").innerText = qty * price;
}

function openMenu(){
document.getElementById("sidebar").classList.add("active")
}

function closeMenu(){
document.getElementById("sidebar").classList.remove("active")
}

function openSupport(){
document.getElementById("supportPopup").classList.add("show")
}

function closeSupport(){
document.getElementById("supportPopup").classList.remove("show")
}

function openBuy(){
document.getElementById("buyPopup").classList.add("show")
calc()
}

function closeBuy(){
document.getElementById("buyPopup").classList.remove("show")
}
</script>

</body>
</html>
