<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>WEBSITE BÁN CLONE FACEBOOK TỰ ĐỘNG</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#f5f5f5}

/* HEADER */
.header{
width:100%;
display:flex;
justify-content:center;
margin-top:20px;
position:relative;
}

.title{
border:2px solid #ddd;
background:#fafafa;
padding:15px 25px;
font-weight:bold;
font-size:20px;
}

/* MENU BUTTON */
.menu-btn{
position:absolute;
left:10px;
top:55px;
font-size:24px;
cursor:pointer;
background:#fff;
padding:5px 10px;
border:1px solid #ccc;
}

/* SIDEBAR */
.sidebar{
position:fixed;
left:-260px;
top:0;
width:260px;
height:100%;
background:#fff;
box-shadow:2px 0 10px rgba(0,0,0,0.2);
transition:0.3s;
padding-top:20px;
z-index:999;
}

.sidebar.active{left:0}

.close-menu{
position:absolute;
right:10px;
top:10px;
cursor:pointer;
font-size:22px;
}

.sidebar a{
display:block;
padding:15px;
border-bottom:1px solid #eee;
cursor:pointer;
}

/* POST */
.container{
max-width:900px;
margin:40px auto;
padding:10px;
}

.post{
background:white;
padding:20px;
border-radius:6px;
transition:0.2s;
position:relative;
}

.post:hover{
transform:translateY(-5px);
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.post-top{
display:flex;
justify-content:space-between;
align-items:flex-start;
gap:10px;
}

.post-title{
font-weight:bold;
}

.buy-btn{
background:red;
color:white;
border:none;
padding:10px 18px;
font-weight:bold;
cursor:pointer;
border-radius:4px;
font-size:15px;
}

.meta{
margin-top:10px;
display:flex;
flex-direction:column;
gap:6px;
}

.box{
border:1px solid #000;
display:inline-block;
padding:3px 8px;
width:fit-content;
font-size:14px;
}

/* POPUP */
.popup-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
z-index:1000;
}

.popup{
background:white;
padding:20px;
border-radius:6px;
min-width:300px;
max-width:90%;
position:relative;
}

.close{
position:absolute;
right:10px;
top:10px;
cursor:pointer;
font-weight:bold;
}

/* SUPPORT */
.support-box{
border:1px solid #ccc;
padding:15px;
margin-top:10px;
cursor:pointer;
text-align:center;
}

/* BUY POPUP */
.buy-row{
margin-top:10px;
}

.buy-row input{
padding:8px;
width:100%;
}

.pay-btn{
margin-top:15px;
background:#28a745;
color:white;
border:none;
padding:12px;
width:100%;
font-weight:bold;
cursor:pointer;
}

@media(max-width:600px){
.post-top{
flex-direction:column;
align-items:flex-start;
}

.buy-btn{
width:100%;
}
}
</style>
</head>

<body>

<div class="header">
<div class="title">WEBSITE BÁN CLONE FACEBOOK TỰ ĐỘNG</div>
<div class="menu-btn" onclick="openMenu()">☰</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<div class="close-menu" onclick="closeMenu()">←</div>
<a>Trang chủ</a>
<a>Nạp tiền</a>
<a onclick="openSupport()">Hỗ trợ</a>
</div>

<!-- POST -->
<div class="container">

<div class="post">
<div class="post-top">
<div class="post-title">
TÀI KHOẢN TẠO 2 THÁNG, 1K-2KFR, 2FA, MAIL NHẬN ĐƯỢC CODE
</div>

<button class="buy-btn" onclick="openBuy()">MUA NGAY</button>
</div>

<div class="meta">
<div class="box">SL: 10</div>
<div class="box">Giá 10000đ</div>
</div>

</div>

</div>

<!-- SUPPORT POPUP -->
<div class="popup-bg" id="supportPopup">
<div class="popup">
<div class="close" onclick="closeSupport()">X</div>

<div class="support-box" onclick="window.location.href='https://zalo.me/0347241585'">
ZALO
</div>

<div class="support-box" onclick="window.location.href='https://www.facebook.com/profile.php?id=1815703088'">
FACEBOOK
</div>

</div>
</div>

<!-- BUY POPUP -->
<div class="popup-bg" id="buyPopup">
<div class="popup">
<div class="close" onclick="closeBuy()">X</div>

<div class="buy-row">
<div>SỐ LƯỢNG CẦN MUA</div>
<input type="number" id="qty" oninput="calc()" placeholder="Nhập số lượng">
</div>

<div class="buy-row">
<div>THÀNH TIỀN</div>
<input type="text" id="total" readonly>
</div>

<button class="pay-btn">THANH TOÁN</button>

</div>
</div>

<script>
function openMenu(){
document.getElementById("sidebar").classList.add("active")
}

function closeMenu(){
document.getElementById("sidebar").classList.remove("active")
}

function openSupport(){
document.getElementById("supportPopup").style.display="flex"
}

function closeSupport(){
document.getElementById("supportPopup").style.display="none"
}

function openBuy(){
document.getElementById("buyPopup").style.display="flex"
}

function closeBuy(){
document.getElementById("buyPopup").style.display="none"
}

function calc(){
let price = 10000
let qty = document.getElementById("qty").value || 0
document.getElementById("total").value = (price * qty).toLocaleString()+" đ"
}
</script>

</body>
</html>
